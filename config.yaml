# TFG HAR - Configuracion del proyecto

dataset_path: "../DataSets/human+activity+recognition+using+smartphones/UCI HAR Dataset/UCI HAR Dataset"

processed_dir: "data/processed"

results_dir: "results"

# Evaluacion
evaluation:
  n_splits: 5
  random_state: 42
  scoring: "accuracy"

# Modelos
models:
  - random_forest
  - logistic_regression
  - linear_svm
  - knn

# Pipelines
pipelines:
  - baseline_561
  - interpretable
  - tsfresh

# Features interpretables
interpretable:
  include_frequency: true
  sampling_rate: 50

# tsfresh
tsfresh:
  extraction_settings: "efficient"
  nan_threshold: 0.5
  impute_remaining: true
